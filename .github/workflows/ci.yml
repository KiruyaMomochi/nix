name: "Nix Flake CI"

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Setup Nix with Cache
        uses: ./.github/actions/setup-nix
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          attic_token: ${{ secrets.ATTIC_TOKEN }}
          attic_endpoint: ${{ secrets.ATTIC_ENDPOINT }}
      - name: Check Flake
        run: nix flake check --no-build

  build-packages:
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        package:
          - naiveproxy
          - caddy-naive
          - sing-box-naive
          - vlmcsd
          - hermes-agent
    steps:
      - uses: actions/checkout@v4
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Setup Nix with Cache
        uses: ./.github/actions/setup-nix
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          attic_token: ${{ secrets.ATTIC_TOKEN }}
          attic_endpoint: ${{ secrets.ATTIC_ENDPOINT }}
      - name: Build ${{ matrix.package }}
        run: nix build .#${{ matrix.package }} --no-link --print-out-paths -L

  build-hosts:
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        host:
          - caon
          - dragons-nest
          - twinkle-wish
          - mercurius-foundation
          - forester
    steps:
      - uses: actions/checkout@v4
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Setup Nix with Cache
        uses: ./.github/actions/setup-nix
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          attic_token: ${{ secrets.ATTIC_TOKEN }}
          attic_endpoint: ${{ secrets.ATTIC_ENDPOINT }}
      - name: Build ${{ matrix.host }}
        run: nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel --no-link -L

  build-home:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Setup Nix with Cache
        uses: ./.github/actions/setup-nix
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          attic_token: ${{ secrets.ATTIC_TOKEN }}
          attic_endpoint: ${{ secrets.ATTIC_ENDPOINT }}
      - name: Build Home Configuration
        run: nix build .#homeConfigurations.kyaru.activationPackage --no-link -L
